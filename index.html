<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#4a90e2,#50c0e9);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden; /* Prevents scroll */
}

.main-container {
  width: 95%;
  max-width: 400px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.3);
}

h1 {
  font-size: 24px;
  color: white;
  margin: 0 0 15px 0;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
}

.row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.field {
  flex: 1;
  text-align: left;
}

label {
  color: white;
  font-size: 12px;
  font-weight: 600;
  display: block;
  margin-bottom: 4px;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #f1c40f;
  color: #333;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s;
}

button:active { transform: scale(0.98); }

#linkBox {
  margin-top: 15px;
  padding-top: 15px;
  border-top: 1px solid rgba(255,255,255,0.2);
  display: none; /* Shown via JS */
  flex-direction: column;
  gap: 8px;
}

.btn-group {
  display: flex;
  gap: 5px;
}

#resultLink {
  background: rgba(255,255,255,0.9);
  font-family: monospace;
}

.checkbox-container {
  color: white;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="main-container">
  <h1>Create Timer</h1>

  <div class="field" style="margin-bottom:10px;">
    <label>Event Title</label>
    <input id="titleInput" placeholder="e.g. New Year Countdown">
  </div>

  <div class="row">
    <div class="field">
      <label>Start Time</label>
      <input type="datetime-local" id="startInput">
    </div>
    <div class="field">
      <label>End Time</label>
      <input type="datetime-local" id="endInput">
    </div>
  </div>

  <div class="checkbox-container">
    <input type="checkbox" id="shortLinkCheckbox">
    <label for="shortLinkCheckbox">Short link format</label>
  </div>

  <button onclick="createTimer()">Generate Link</button>

  <div id="linkBox">
    <input id="resultLink" readonly>
    <div class="btn-group">
      <button onclick="copyLink()" style="background:#fff;">Copy</button>
      <button onclick="openTimer()" style="background:#fff;">Open</button>
    </div>
  </div>
</div>

<script>
function createTimer(){
  const title = document.getElementById("titleInput").value.trim();
  const start = document.getElementById("startInput").value;
  const end = document.getElementById("endInput").value;

  if(!start || !end){
    alert("Select dates first!");
    return;
  }

  const baseURL = "timer.html";
  let link;

  if(document.getElementById("shortLinkCheckbox").checked){
    const t = encodeURIComponent(title).replace(/%20/g,'_');
    const s = start.replace(/[-:]/g,'').replace('T','-');
    const e = end.replace(/[-:]/g,'').replace('T','-');
    link = `${baseURL}?title=${t}&start=${s}&end=${e}`;
  } else {
    link = `${baseURL}?title=${encodeURIComponent(title)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
  }

  document.getElementById("resultLink").value = link;
  document.getElementById("linkBox").style.display = "flex";
}

function copyLink(){
  const link = document.getElementById("resultLink");
  link.select();
  document.execCommand("copy");
  alert("Copied!");
}

function openTimer(){
  const link = document.getElementById("resultLink").value;
  if(link) window.open(link,'_blank');
}
</script>

</body>
</html>

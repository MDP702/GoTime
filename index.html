<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: 
    linear-gradient(135deg, rgba(52,152,219,0.7), rgba(41,128,185,0.7)),
    url('YOUR_IMAGE.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  text-align: center;
  padding: 80px 20px;
}

h1 {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 60px;
  text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
}

.card {
  background: rgba(0,0,0,0.2);
  padding: 50px;
  border-radius: 40px;
  display: inline-block;
  max-width: 600px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

input, button {
  font-size: 28px;
  padding: 18px;
  margin: 15px 0;
  width: 95%;
  border-radius: 16px;
  border: none;
  outline: none;
}

input {
  background: rgba(255,255,255,0.15);
  color: #fff;
  box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
}

button {
  background-color: #f1c40f;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #f4d03f;
}
</style>
</head>
<body>

<h1>Its Go Time</h1>

<div class="card">
  <label>Event Title:</label><br>
  <input type="text" id="eventTitle" placeholder="Enter event title here"><br>

  <label>Start Time:</label><br>
  <input type="datetime-local" id="startTime"><br>

  <label>End Time:</label><br>
  <input type="datetime-local" id="endTime"><br>

  <button onclick="openTimer()">Create & Open Timer</button>
</div>

<script>
function openTimer() {
    const title = encodeURIComponent(document.getElementById('eventTitle').value);
    const start = encodeURIComponent(document.getElementById('startTime').value);
    const end = encodeURIComponent(document.getElementById('endTime').value);

    if (!title || !start || !end) return alert("Please fill all fields!");

    const url = `timer.html?title=${title}&start=${start}&end=${end}`;
    window.open(url, '_blank');
}
</script>

</body>
</html>

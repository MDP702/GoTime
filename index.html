<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sync | Time Coordinator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --working-hour: #0ea5e9;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 800px;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { font-weight: 500; font-size: 24px; margin: 0; letter-spacing: 1px; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 5px; }

        /* TIME SLIDER */
        .slider-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .main-time-display {
            text-align: center;
            font-size: 48px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--accent);
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            background: #334155;
            height: 6px;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* CITY LIST */
        .city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .city-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .city-card.working-hours {
            border-color: var(--working-hour);
            background: rgba(14, 165, 233, 0.1);
        }

        .city-info span {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .city-name { font-weight: 500; font-size: 16px; color: var(--text-main); }
        .city-time { font-size: 18px; font-weight: 500; }

        .footer-actions {
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Global Sync</h1>
        <p>Drag the slider to coordinate across timezones</p>
    </header>

    <div class="slider-section">
        <div class="main-time-display" id="mainClock">12:00</div>
        <input type="range" id="timeSlider" min="0" max="1439" value="720">
        <div style="display: flex; justify-content: space-between; margin-top: 10px; color: var(--text-dim); font-size: 12px;">
            <span>00:00</span>
            <span>NOON</span>
            <span>23:59</span>
        </div>
    </div>

    <div class="city-grid" id="cityGrid">
        </div>

    <div class="footer-actions">
        <button class="btn" onclick="createEvent()">Create Event Link</button>
    </div>
</div>

<script>
    // Configuration: Add your cities and their UTC offsets here
    const locations = [
        { name: "Local Time", offset: new Date().getTimezoneOffset() / -60, isLocal: true },
        { name: "London", offset: 0 },
        { name: "New York", offset: -5 },
        { name: "Tokyo", offset: 9 }
    ];

    const slider = document.getElementById('timeSlider');
    const mainClock = document.getElementById('mainClock');
    const cityGrid = document.getElementById('cityGrid');

    function formatTime(totalMinutes) {
        let mins = totalMinutes % 1440;
        if (mins < 0) mins += 1440;
        const h = Math.floor(mins / 60);
        const m = Math.floor(mins % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function updateClocks() {
        const sliderVal = parseInt(slider.value); // Minutes from start of day in UTC or Local
        mainClock.innerText = formatTime(sliderVal);
        
        cityGrid.innerHTML = '';
        
        // Use local time as the base for the slider
        const localOffset = new Date().getTimezoneOffset() / -60;

        locations.forEach(loc => {
            // Calculate time based on the difference from local offset
            const diff = loc.offset - localOffset;
            const cityMinutes = sliderVal + (diff * 60);
            const timeStr = formatTime(cityMinutes);
            
            // "Golden Hours" logic (9 AM to 5 PM)
            const currentHour = (Math.floor(cityMinutes / 60)) % 24;
            const isWorking = currentHour >= 9 && currentHour < 17;

            const card = document.createElement('div');
            card.className = `city-card ${isWorking ? 'working-hours' : ''}`;
            card.innerHTML = `
                <div class="city-info">
                    <span>${loc.offset >= 0 ? '+' : ''}${loc.offset} UTC</span>
                    <div class="city-name">${loc.name}</div>
                </div>
                <div class="city-time">${timeStr}</div>
            `;
            cityGrid.appendChild(card);
        });
    }

    function createEvent() {
        const time = formatTime(parseInt(slider.value));
        alert(`Event link created for ${time}!\n(In a real app, this would generate a unique URL)`);
    }

    slider.addEventListener('input', updateClocks);
    window.onload = updateClocks;
</script>

</body>
</html>

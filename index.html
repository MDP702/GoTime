<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#4a90e2,#50c0e9);
  text-align:center;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TITLE */
h1{
  font-size:clamp(28px, 6vw, 60px);
  color:white;
  margin-bottom:20px;
  letter-spacing:2px;
  text-shadow:
    0 0 4px rgba(255,255,255,0.7),
    0 0 8px rgba(255,255,255,0.5),
    1px 1px 4px rgba(0,0,0,0.5);
}

/* MAIN CARD */
.card{
  background:linear-gradient(145deg,#6FA8DC,#4A90E2);
  border-radius:20px;
  padding:20px;
  width:100%;
  max-width:360px; /* much smaller card */
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:
    5px 5px 15px rgba(0,0,0,0.3),
    -3px -3px 10px rgba(255,255,255,0.2);
}

label{
  color:white;
  font-size:16px;
  font-weight:700;
}

input{
  font-size:16px;
  padding:8px;
  border-radius:8px;
  border:none;
  text-align:center;
  width:100%;
}

/* BUTTON */
button{
  margin-top:10px;
  font-size:16px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg,#f1c40f,#f9e79f);
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:linear-gradient(135deg,#f9e79f,#f1c40f);
}

/* LINK CARD */
#linkBox{
  margin-top:20px;
  background:linear-gradient(145deg,#6FA8DC,#4A90E2);
  padding:15px;
  border-radius:20px;
  width:100%;
  max-width:360px; /* match main card */
  box-shadow:
    5px 5px 15px rgba(0,0,0,0.3),
    -3px -3px 10px rgba(255,255,255,0.2);
  display:none;
  flex-direction:column;
  align-items:center;
}

#resultLink{
  width:90%;
  font-size:14px;
  padding:6px;
  border-radius:8px;
  border:none;
  text-align:center;
  margin-bottom:10px;
}

/* CHECKBOX */
.checkbox-container{
  color:white;
  font-size:14px;
  margin-top:5px;
  display:flex;
  align-items:center;
  gap:5px;
}
</style>
</head>

<body>

<h1>Create Timer</h1>

<div class="card">

  <label>Event Title</label>
  <input id="titleInput" placeholder="Edit Title">

  <label>Start Time</label>
  <input type="datetime-local" id="startInput">

  <label>End Time</label>
  <input type="datetime-local" id="endInput">

  <div class="checkbox-container">
    <input type="checkbox" id="shortLinkCheckbox">
    <label for="shortLinkCheckbox">Generate short link</label>
  </div>

  <button onclick="createTimer()">Create Timer Link</button>

</div>

<div id="linkBox">
  <input id="resultLink" readonly>
  <button onclick="copyLink()">Copy Link</button>
  <button onclick="openTimer()">Open Timer</button>
</div>

<script>
function createTimer(){
  const title = document.getElementById("titleInput").value.trim();
  const start = document.getElementById("startInput").value;
  const end = document.getElementById("endInput").value;

  if(!start || !end){
    alert("Please select start and end time");
    return;
  }

  const baseURL = "timer.html";
  let link;

  if(document.getElementById("shortLinkCheckbox").checked){
    const t = encodeURIComponent(title).replace(/%20/g,'_');
    const s = start.replace(/[-:]/g,'').replace('T','-');
    const e = end.replace(/[-:]/g,'').replace('T','-');
    link = `${baseURL}?title=${t}&start=${s}&end=${e}`;
  } else {
    link = `${baseURL}?title=${encodeURIComponent(title)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
  }

  document.getElementById("resultLink").value = link;
  document.getElementById("linkBox").style.display = "flex";
}

function copyLink(){
  const link = document.getElementById("resultLink");
  link.select();
  document.execCommand("copy");
  alert("Link copied!");
}

function openTimer(){
  const link = document.getElementById("resultLink").value;
  if(link) window.open(link,'_blank');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: 
    linear-gradient(135deg, rgba(74,144,226,0.7), rgba(80,192,233,0.7)),
    url('https://www.publicdomainpictures.net/pictures/320000/velka/blue-sky-clouds.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  text-align: center;
  padding: 60px 20px;
}
h1 {
  font-size: 64px;
  margin-bottom: 50px;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
}
.card {
  background: rgba(0,0,0,0.35);
  padding: 50px;
  border-radius: 25px;
  display: inline-block;
  max-width: 500px;
}
label {
  font-size: 24px;
}
input, button {
  font-size: 28px;
  padding: 18px;
  margin: 14px 0;
  width: 95%;
  border-radius: 14px;
  border: none;
}
button {
  background-color: #ffce00;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background-color: #ffd633;
}
</style>
</head>
<body>

<h1>Its Go Time</h1>

<div class="card">
  <label>Event Title:</label><br>
  <input type="text" id="eventTitle" placeholder="Enter event title here"><br>

  <label>Start Time:</label><br>
  <input type="datetime-local" id="startTime"><br>

  <label>End Time:</label><br>
  <input type="datetime-local" id="endTime"><br>

  <button onclick="openTimer()">Create & Open Timer</button>
</div>

<script>
function openTimer() {
    const title = encodeURIComponent(document.getElementById('eventTitle').value);
    const start = encodeURIComponent(document.getElementById('startTime').value);
    const end = encodeURIComponent(document.getElementById('endTime').value);

    if (!title || !start || !end) return alert("Please fill all fields!");

    const url = `timer.html?title=${title}&start=${start}&end=${end}`;
    window.open(url, '_blank');
}
</script>

</body>
</html>

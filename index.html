<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4a90e2, #50c0e9);
  text-align: center;
  padding: 60px 20px;
  min-height: 100vh;
}

h1 {
  font-size: 72px;
  font-weight: 700;
  margin-bottom: 50px;
  color: #fff;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  letter-spacing: 1px;
}

.card {
  background: linear-gradient(145deg, #4a90e2, #357ABD);
  padding: 60px 50px;
  border-radius: 30px;
  display: inline-block;
  max-width: 600px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25), -5px -5px 20px rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
}

label {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  display: block;
  margin-top: 25px;
  letter-spacing: 0.5px;
}

input {
  font-size: 24px;
  padding: 16px 20px;
  margin: 12px 0;
  width: 90%;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
  text-align: center;
  background: rgba(255,255,255,0.15);
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

input::placeholder {
  color: rgba(255,255,255,0.7);
}

input:focus {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.4);
  box-shadow: inset 0 4px 8px rgba(0,0,0,0.15), 0 0 15px rgba(255,255,255,0.2);
}

button {
  font-size: 26px;
  padding: 16px 30px;
  margin-top: 30px;
  margin-bottom: 10px;
  width: 90%;
  border-radius: 12px;
  border: none;
  outline: none;
  text-align: center;
  background: linear-gradient(135deg, #f1c40f, #f9e79f);
  color: #333;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(241, 196, 15, 0.4), inset 0 -2px 5px rgba(0,0,0,0.1);
  letter-spacing: 0.5px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(241, 196, 15, 0.6), inset 0 -2px 5px rgba(0,0,0,0.1);
  background: linear-gradient(135deg, #f9e79f, #f1c40f);
}

button:active {
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4), inset 0 -2px 5px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<h1>Its Go Time</h1>

<div class="card">
  <label>Event Title</label>
  <input type="text" id="eventTitle" placeholder="Enter event title here">

  <label>Start Time</label>
  <input type="datetime-local" id="startTime">

  <label>End Time</label>
  <input type="datetime-local" id="endTime">

  <button onclick="openTimer()">Create & Open Timer</button>
</div>

<script>
function openTimer() {
    const title = encodeURIComponent(document.getElementById('eventTitle').value);
    const start = encodeURIComponent(document.getElementById('startTime').value);
    const end = encodeURIComponent(document.getElementById('endTime').value);

    if (!title || !start || !end) return alert("Please fill all fields!");

    const url = `timer.html?title=${title}&start=${start}&end=${end}`;
    window.open(url, '_blank');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Event Timer</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f0f0f0; }
h1 { color: #333; }
input, button { font-size: 16px; padding: 6px; margin: 5px; }
#countdown { font-size: 24px; margin-top: 20px; white-space: pre-line; }
</style>
</head>
<body>

<h1>Global Event Timer</h1>

<label>Event Title:</label><br>
<input type="text" id="eventTitle" placeholder="Enter event title"><br>

<label>Start Time (Your Local Time):</label><br>
<input type="datetime-local" id="startTime"><br>

<label>End Time (Your Local Time):</label><br>
<input type="datetime-local" id="endTime"><br>

<button onclick="createTimer()">Create Timer & Link</button>

<p id="countdown"></p>

<script>
// Helper: format date in visitor's timezone
function formatTimeInZone(date) {
    const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return new Intl.DateTimeFormat([], {
        timeZone: userTZ,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
    }).format(date);
}

// Start countdown function
let timerInterval;
function startCountdown(start, end, title) {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const now = new Date();
        let displayText = title + "\n";

        if (now < start) {
            const diff = start - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            displayText += `Event starts in: ${h}h ${m}m ${s}s\nStart time: ${formatTimeInZone(start)}`;
        } else if (now >= start && now <= end) {
            const diff = end - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            displayText += `Event is live! Ends in: ${h}h ${m}m ${s}s\nEnd time: ${formatTimeInZone(end)}`;
        } else {
            displayText += "Event has ended!";
            clearInterval(timerInterval);
        }

        document.getElementById('countdown').innerText = displayText;
    }, 1000);
}

// Create shareable link
function createTimer() {
    const title = document.getElementById('eventTitle').value;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;

    if (!title || !start || !end) return alert("Please fill in all fields!");

    const url = new URL(window.location);
    url.searchParams.set('title', title);
    url.searchParams.set('start', start);
    url.searchParams.set('end', end);
    window.history.replaceState({}, '', url);

    startCountdown(new Date(start), new Date(end), title);
    navigator.clipboard.writeText(url.href).then(() => alert("Shareable link copied!"));
}

// Load from URL parameters
const params = new URLSearchParams(window.location.search);
const savedTitle = params.get('title');
const savedStart = params.get('start');
const savedEnd = params.get('end');
if (savedTitle && savedStart && savedEnd) {
    document.getElementById('eventTitle').value = savedTitle;
    document.getElementById('startTime').value = savedStart;
    document.getElementById('endTime').value = savedEnd;
    startCountdown(new Date(savedStart), new Date(savedEnd), savedTitle);
}
</script>

</body>
</html>

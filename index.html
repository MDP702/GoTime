<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#4a90e2,#50c0e9);
  text-align:center;
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TITLE */
h1{
  font-size:80px;
  color:white;
  margin-bottom:50px;
  letter-spacing:3px;
  text-shadow:
    0 0 5px rgba(255,255,255,0.7),
    0 0 10px rgba(255,255,255,0.5),
    2px 2px 5px rgba(0,0,0,0.5);
}

/* MAIN CARD */
.card{
  background:linear-gradient(145deg,#6FA8DC,#4A90E2);
  border-radius:50px;
  padding:60px 50px;
  min-width:600px;
  max-width:800px;
  display:flex;
  flex-direction:column;
  gap:20px;
  box-shadow:
    10px 10px 30px rgba(0,0,0,0.3),
    -5px -5px 20px rgba(255,255,255,0.2);
}

label{
  color:white;
  font-size:28px;
  font-weight:700;
}

input{
  font-size:24px;
  padding:14px;
  border-radius:14px;
  border:none;
  text-align:center;
}

/* BUTTON */
button{
  margin-top:20px;
  font-size:28px;
  padding:18px;
  border-radius:18px;
  border:none;
  background:linear-gradient(135deg,#f1c40f,#f9e79f);
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:linear-gradient(135deg,#f9e79f,#f1c40f);
}

/* LINK CARD */
#linkBox{
  margin-top:40px;
  background:linear-gradient(145deg,#6FA8DC,#4A90E2);
  padding:30px;
  border-radius:40px;
  min-width:600px;
  max-width:800px;
  box-shadow:
    10px 10px 30px rgba(0,0,0,0.3),
    -5px -5px 20px rgba(255,255,255,0.2);
  display:none;
  flex-direction:column;
  align-items:center;
}

#resultLink{
  width:90%;
  font-size:24px;
  padding:14px;
  border-radius:14px;
  border:none;
  text-align:center;
  margin-bottom:15px;
}

/* CHECKBOX */
.checkbox-container{
  color:white;
  font-size:20px;
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<h1>Create Timer</h1>

<div class="card">

  <label>Event Title</label>
  <input id="titleInput" placeholder="Event Title">

  <label>Start Time</label>
  <input type="datetime-local" id="startInput">

  <label>End Time</label>
  <input type="datetime-local" id="endInput">

  <div class="checkbox-container">
    <input type="checkbox" id="shortLinkCheckbox">
    <label for="shortLinkCheckbox">Generate short link</label>
  </div>

  <button onclick="createTimer()">Create Timer Link</button>

</div>

<div id="linkBox">
  <input id="resultLink" readonly>
  <button onclick="copyLink()">Copy Link</button>
  <button onclick="openTimer()">Open Timer</button>
</div>

<script>
function createTimer(){
  const title = document.getElementById("titleInput").value;
  const start = document.getElementById("startInput").value;
  const end = document.getElementById("endInput").value;

  if(!start || !end){
    alert("Please select start and end time");
    return;
  }

  let baseURL = "timer.html";

  let link;
  if(document.getElementById("shortLinkCheckbox").checked){
    // Simple short link code
    const code = Math.random().toString(36).substring(2,8);
    link = `${baseURL}?c=${code}&t=${encodeURIComponent(title)}&s=${encodeURIComponent(start)}&e=${encodeURIComponent(end)}`;
  } else {
    link = `${baseURL}?title=${encodeURIComponent(title)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
  }

  document.getElementById("resultLink").value = link;
  document.getElementById("linkBox").style.display = "flex";
}

function copyLink(){
  const link = document.getElementById("resultLink");
  link.select();
  document.execCommand("copy");
  alert("Link copied!");
}

function openTimer(){
  const link = document.getElementById("resultLink").value;
  if(link) window.open(link,'_blank');
}
</script>

</body>
</html>

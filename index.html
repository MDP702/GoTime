<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  font-weight: 300; /* Standard Light weight */
  background: linear-gradient(135deg, #4a90e2, #50c0e9);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden; 
}

.main-container {
  width: 95%;
  max-width: 360px;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

h1 {
  font-size: 22px;
  font-weight: 500;
  color: #2c3e50;
  margin: 0 0 20px 0;
  text-align: center;
  letter-spacing: 0.5px;
}

.field {
  margin-bottom: 15px;
}

label {
  color: #7f8c8d;
  font-size: 11px;
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #dfe6e9;
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  outline: none;
  color: #2d3436;
}

input:focus {
  border-color: #4a90e2;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #4a90e2;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-confirm {
  background: #2ecc71;
}

.btn-open {
  background: #f1c40f;
  color: #2d3436;
}

#linkSection {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px dashed #dfe6e9;
  display: none; 
  text-align: center;
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.success-msg {
  color: #27ae60;
  font-size: 13px;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<div class="main-container">
  <h1>Create Timer</h1>

  <div class="field">
    <label>Event Title</label>
    <input id="titleInput" placeholder="e.g. Lunch Break">
  </div>

  <div class="field">
    <label>Start Time</label>
    <input type="datetime-local" id="startInput">
  </div>

  <div class="field">
    <label>End Time</label>
    <input type="datetime-local" id="endInput">
  </div>

  <button id="confirmBtn" class="btn-primary btn-confirm" onclick="confirmDates()">Confirm Dates</button>

  <div id="linkSection">
    <div class="success-msg">✓ Dates confirmed</div>
    <button class="btn-primary btn-open" onclick="openTimer()">Open Timer Now</button>
  </div>
</div>

<script>
let finalURL = "";

function confirmDates() {
  const title = document.getElementById("titleInput").value.trim();
  const start = document.getElementById("startInput").value;
  const end = document.getElementById("endInput").value;

  if (!start || !end) {
    alert("Please select both start and end times.");
    return;
  }

  if (new Date(start) >= new Date(end)) {
    alert("End time must be after the start time.");
    return;
  }

  // Generate the link
  const baseURL = "timer.html";
  finalURL = `${baseURL}?title=${encodeURIComponent(title)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;

  // Show the confirmation and Open button
  document.getElementById("linkSection").style.display = "block";
  document.getElementById("confirmBtn").innerText = "Update Settings";
}

function openTimer() {
  if (finalURL) {
    window.open(finalURL, '_blank');
  }
}
</script>

</body>
</html>

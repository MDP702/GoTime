<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4a90e2, #50c0e9);
  text-align: center;
  padding: 80px 20px;
  min-height: 100vh;
}

h1 {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 60px;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}

.card {
  background: linear-gradient(145deg, #4a90e2, #357ABD);
  padding: 50px;
  border-radius: 40px;
  display: inline-block;
  max-width: 600px;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.2);
}

label {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
  display: block;
  margin-top: 20px;
}

input {
  font-size: 28px;
  padding: 18px;
  margin: 15px 0;
  width: 95%;
  border-radius: 16px;
  border: none;
  outline: none;
  text-align: center;
  background: rgba(255,255,255,0.2);
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

input:focus {
  background: rgba(255,255,255,0.3);
  box-shadow: inset 0 5px 10px rgba(0,0,0,0.15);
}

button {
  font-size: 28px;
  padding: 18px;
  margin: 25px 0 15px 0;
  width: 95%;
  border-radius: 16px;
  border: none;
  outline: none;
  text-align: center;
  background-color: #f1c40f;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.2);
}

button:hover {
  background-color: #f4d03f;
  transform: translateY(-2px);
}
</style>
</head>
<body>

<h1>Its Go Time</h1>

<div class="card">
  <label>Event Title:</label>
  <input type="text" id="eventTitle" placeholder="Enter event title here"><br>

  <label>Start Time:</label>
  <input type="datetime-local" id="startTime"><br>

  <label>End Time:</label>
  <input type="datetime-local" id="endTime"><br>

  <button onclick="openTimer()">Create & Open Timer</button>
</div>

<script>
function openTimer() {
    const title = encodeURIComponent(document.getElementById('eventTitle').value);
    const start = encodeURIComponent(document.getElementById('startTime').value);
    const end = encodeURIComponent(document.getElementById('endTime').value);

    if (!title || !start || !end) return alert("Please fill all fields!");

    const url = `timer.html?title=${title}&start=${start}&end=${end}`;
    window.open(url, '_blank');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #4a90e2, #50c0e9); /* soft blue gradient */
  color: #fff;
  text-align: center;
  padding: 60px 20px;
}
h1 {
  font-size: 48px; /* bigger heading */
  margin-bottom: 40px;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
}
.card {
  background: rgba(0,0,0,0.2);
  padding: 40px;
  border-radius: 20px;
  display: inline-block;
  max-width: 450px;
}
input, button {
  font-size: 22px; /* bigger text */
  padding: 12px;
  margin: 12px 0;
  width: 95%;
  border-radius: 10px;
  border: none;
}
button {
  background-color: #ffce00;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background-color: #ffd633;
}
</style>
</head>
<body>

<h1>Its Go Time</h1>

<div class="card">
  <label>Event Title:</label><br>
  <input type="text" id="eventTitle" value="Its Go Time"><br>

  <label>Start Time:</label><br>
  <input type="datetime-local" id="startTime"><br>

  <label>End Time:</label><br>
  <input type="datetime-local" id="endTime"><br>

  <button onclick="openTimer()">Create & Open Timer</button>
</div>

<script>
function openTimer() {
    const title = encodeURIComponent(document.getElementById('eventTitle').value);
    const start = encodeURIComponent(document.getElementById('startTime').value);
    const end = encodeURIComponent(document.getElementById('endTime').value);

    if (!title || !start || !end) return alert("Please fill all fields!");

    const url = `timer.html?title=${title}&start=${start}&end=${end}`;
    window.open(url, '_blank'); // open new tab
}
</script>

</body>
</html>

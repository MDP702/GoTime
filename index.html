<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4a90e2, #50c0e9);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 500px;
        }
        h1 { margin: 0 0 10px; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        #status { font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .timer-display { font-size: 3.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .label { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="eventTitle">Loading...</h1>
    <div id="status">Starting in:</div>
    <div class="timer-display" id="clock">00:00:00</div>
    <div class="label" id="dateRange"></div>
</div>

<script>
    function parseDate(str) {
        if (!str) return null;
        // Handles "short" format: 20231025-1430 (YYYYMMDD-HHmm)
        if (str.includes('-') && !str.includes(':')) {
            const [datePart, timePart] = str.split('-');
            const y = datePart.substring(0, 4);
            const m = datePart.substring(4, 6) - 1;
            const d = datePart.substring(6, 8);
            const hr = timePart.substring(0, 2);
            const min = timePart.substring(2, 4);
            return new Date(y, m, d, hr, min);
        }
        return new Date(decodeURIComponent(str));
    }

    // Get URL Parameters
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title')?.replace(/_/g, ' ') || "Event Timer";
    const startTime = parseDate(params.get('start'));
    const endTime = parseDate(params.get('end'));

    document.getElementById('eventTitle').innerText = title;

    function updateTimer() {
        const now = new Date();
        let diff, statusText;

        if (now < startTime) {
            statusText = "Starts In:";
            diff = startTime - now;
        } else if (now < endTime) {
            statusText = "Ending In:";
            diff = endTime - now;
        } else {
            statusText = "Event Finished";
            diff = 0;
        }

        document.getElementById('status').innerText = statusText;

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('clock').innerText = 
            `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    if (startTime && endTime) {
        setInterval(updateTimer, 1000);
        updateTimer();
    } else {
        document.getElementById('eventTitle').innerText = "Invalid Timer Link";
    }
</script>
</body>
</html>

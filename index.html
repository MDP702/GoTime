<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  text-align: center;
  padding: 80px 20px;
  min-height: 100vh;
}

h1 {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 60px;
  color: #fff;
  text-shadow: 0 0 20px rgba(102, 126, 234, 0.8), 2px 2px 6px rgba(0,0,0,0.5);
  letter-spacing: 2px;
}

.card {
  background: linear-gradient(145deg, #667eea, #5568d3);
  padding: 50px;
  border-radius: 40px;
  display: inline-block;
  max-width: 600px;
  box-shadow: 0 0 40px rgba(102, 126, 234, 0.6), 0 0 80px rgba(118, 75, 162, 0.4), 10px 10px 30px rgba(0,0,0,0.3);
  border: 3px solid #00d4ff;
  backdrop-filter: blur(10px);
}

label {
  font-size: 32px;
  font-weight: 700;
  color: #00d4ff;
  text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
  display: block;
  margin-top: 20px;
}

input {
  font-size: 28px;
  padding: 18px;
  margin: 15px 0;
  width: 95%;
  border-radius: 16px;
  border: 2px solid #00d4ff;
  outline: none;
  text-align: center;
  background: rgba(255,255,255,0.15);
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.3), 0 0 10px rgba(0, 212, 255, 0.2);
  transition: 0.3s;
}

input:focus {
  background: rgba(255,255,255,0.25);
  box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.4), 0 0 20px rgba(0, 212, 255, 0.4);
  border-color: #00ff88;
}

button {
  font-size: 28px;
  padding: 18px;
  margin: 25px 0 15px 0;
  width: 95%;
  border-radius: 16px;
  border: none;
  outline: none;
  text-align: center;
  background: linear-gradient(135deg, #FF6B6B, #FFA502);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 0 8px 0 #ff5252, 0 0 20px rgba(255, 107, 107, 0.5);
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 0 #ff5252, 0 0 30px rgba(255, 107, 107, 0.8);
  background: linear-gradient(135deg, #FF7B7B, #FFB52A);
}

button:active {
  transform: translateY(6px);
  box-shadow: 0 2px 0 #ff5252, 0 0 15px rgba(255, 107, 107, 0.5);
}
</style>
</head>
<body>

<h1>Its Go Time</h1>

<div class="card">
  <label>Event Title:</label>
  <input type="text" id="eventTitle" placeholder="Enter event title here"><br>

  <label>Start Time:</label>
  <input type="datetime-local" id="startTime"><br>

  <label>End Time:</label>
  <input type="datetime-local" id="endTime"><br>

  <button onclick="openTimer()">Create & Open Timer</button>
</div>

<script>
function openTimer() {
    const title = encodeURIComponent(document.getElementById('eventTitle').value);
    const start = encodeURIComponent(document.getElementById('startTime').value);
    const end = encodeURIComponent(document.getElementById('endTime').value);

    if (!title || !start || !end) return alert("Please fill all fields!");

    const url = `timer.html?title=${title}&start=${start}&end=${end}`;
    window.open(url, '_blank');
}
</script>

</body>
</html>

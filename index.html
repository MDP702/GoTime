<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Skapa Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #4a90e2, #50c0e9);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden; 
}

.main-container {
  width: 95%;
  max-width: 380px;
  background: white;
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h1 {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  margin: 0 0 16px 0;
  text-align: center;
}

.field {
  margin-bottom: 12px;
}

label {
  color: #444;
  font-size: 13px;
  font-weight: 600;
  display: block;
  margin-bottom: 5px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #eee;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

input:focus {
  border-color: #4a90e2;
}

/* Knapp-stilar */
.btn-primary {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #4a90e2;
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  margin-top: 5px;
  transition: opacity 0.2s;
}

.btn-confirm {
  background: #27ae60;
  margin-bottom: 10px;
}

.btn-open {
  background: #f1c40f;
  color: #333;
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

#linkSection {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid #eee;
  display: none; 
  text-align: center;
}

.success-msg {
  color: #27ae60;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="main-container">
  <h1>Skapa Timer</h1>

  <div class="field">
    <label>Titel</label>
    <input id="titleInput" placeholder="T.ex. Lunchrast">
  </div>

  <div class="field">
    <label>Starttid</label>
    <input type="datetime-local" id="startInput">
  </div>

  <div class="field">
    <label>Sluttid</label>
    <input type="datetime-local" id="endInput">
  </div>

  <button id="confirmBtn" class="btn-primary btn-confirm" onclick="confirmDates()">Bekräfta datum</button>

  <div id="linkSection">
    <div class="success-msg">✓ Datum bekräftade</div>
    <button class="btn-primary btn-open" onclick="openTimer()">Öppna Timer nu</button>
  </div>
</div>

<script>
let finalURL = "";

function confirmDates() {
  const title = document.getElementById("titleInput").value.trim();
  const start = document.getElementById("startInput").value;
  const end = document.getElementById("endInput").value;

  if (!start || !end) {
    alert("Vänligen fyll i både start- och sluttid.");
    return;
  }

  if (new Date(start) >= new Date(end)) {
    alert("Sluttiden måste vara efter starttiden.");
    return;
  }

  // Skapa länken
  const baseURL = "timer.html";
  finalURL = `${baseURL}?title=${encodeURIComponent(title)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;

  // Visa nästa steg
  document.getElementById("linkSection").style.display = "block";
  document.getElementById("confirmBtn").innerText = "Uppdatera val";
}

function openTimer() {
  if (finalURL) {
    window.open(finalURL, '_blank');
  }
}
</script>

</body>
</html>

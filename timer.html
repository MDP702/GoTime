<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4a90e2, #50c0e9); /* soft blue gradient */
  text-align: center;
  padding: 80px 20px;
}

#title {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 60px;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}

#countdown {
  font-size: 72px;
  margin-top: 30px;
  padding: 50px;
  background: linear-gradient(145deg, #4a90e2, #357ABD); /* 3D blue gradient */
  border-radius: 40px;
  display: inline-block;
  min-width: 500px;
  white-space: pre-line;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.2);
  text-align: center;
}

#countdown .number {
  font-size: 100px;
  font-weight: 700;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
  display: block;
  margin: 20px 0;
}

#countdown .eventTime {
  font-size: 38px;
  color: #fff;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
  margin: 5px 0;
  line-height: 1.4;
}

#linkBox {
  margin-top: 40px;
  background: linear-gradient(145deg, #4a90e2, #357ABD);
  padding: 30px;
  border-radius: 30px;
  display: inline-block;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.2);
}

input#timerLink {
  font-size: 28px;
  padding: 16px;
  width: 80%;
  border-radius: 16px;
  border: none;
  text-align: center;
  background: rgba(255,255,255,0.2);
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

button#copyBtn {
  font-size: 28px;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background-color: #f1c40f;
  color: #000;
  font-weight: bold;
  margin-left: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button#copyBtn:hover {
  background-color: #f4d03f;
}
</style>
</head>
<body>

<h1 id="title"></h1>
<p id="countdown"></p>

<div id="linkBox">
  <input type="text" id="timerLink" readonly>
  <button id="copyBtn" onclick="copyLink()">Copy Link</button>
</div>

<script>
function formatTimeLines(date) {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;

    // Line 1: Weekday – Time
    const optionsLine1 = { weekday:'long', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone: tz };
    const line1 = new Intl.DateTimeFormat([], optionsLine1).format(date);

    // Line 2: Date, Month Year
    const optionsLine2 = { day:'2-digit', month:'long', year:'numeric', timeZone: tz };
    const line2 = new Intl.DateTimeFormat([], optionsLine2).format(date);

    return [line1, line2];
}

function copyLink() {
    const linkInput = document.getElementById("timerLink");
    linkInput.select();
    linkInput.setSelectionRange(0, 99999); 
    document.execCommand("copy");
    alert("Link copied to clipboard!");
}

const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "";
const startParam = params.get('start');
const endParam = params.get('end');

const currentURL = window.location.href;
document.getElementById('timerLink').value = currentURL;

if (!startParam || !endParam) {
    document.getElementById('countdown').innerHTML = "<span class='status'>Error: start or end time missing!</span>";
    document.getElementById('title').innerText = title;
} else {
    const start = new Date(startParam);
    const end = new Date(endParam);
    document.getElementById('title').innerText = title;

    const interval = setInterval(() => {
        const now = new Date();
        let line1="", line2="", line3="", line4="";

        const [startLine1, startLine2] = formatTimeLines(start);
        const [endLine1, endLine2] = formatTimeLines(end);

        if (now < start) {
            const diff = start - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            line1 = "START";
            line2 = `<span class='number'>${h}h ${m}m ${s}s</span>`;
            line3 = `<span class='eventTime'>${startLine1}</span>`;
            line4 = `<span class='eventTime'>${startLine2}</span>`;
        } else if (now >= start && now <= end) {
            const diff = end - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            line1 = "LIVE";
            line2 = `<span class='number'>${h}h ${m}m ${s}s</span>`;
            line3 = `<span class='eventTime'>${endLine1}</span>`;
            line4 = `<span class='eventTime'>${endLine2}</span>`;
        } else {
            line1 = "ENDED";
            line2 = "";
            line3 = "";
            line4 = "";
            clearInterval(interval);
        }

        document.getElementById('countdown').innerHTML = `${line1}\n${line2}\n${line3}\n${line4}`;
    }, 1000);
}
</script>

</body>
</html>

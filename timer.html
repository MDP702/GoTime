<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<style>
body { font-family: Arial; text-align: center; padding: 40px; background: #f0f0f0; }
#countdown { font-size: 24px; margin-top: 20px; white-space: pre-line; }
</style>
</head>
<body>

<h1 id="title"></h1>
<p id="countdown"></p>

<script>
function formatTimeInZone(date) {
    const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return new Intl.DateTimeFormat([], {
        timeZone: userTZ,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
    }).format(date);
}

// Get URL parameters
const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "Its Go Time";
const start = new Date(params.get('start'));
const end = new Date(params.get('end'));

document.getElementById('title').innerText = title;

let timerInterval = setInterval(() => {
    const now = new Date();
    let display = "";

    if (now < start) {
        const diff = start - now;
        const h = Math.floor(diff / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        const s = Math.floor((diff % (1000*60)) / 1000);
        display = `Event starts in: ${h}h ${m}m ${s}s\nStart time: ${formatTimeInZone(start)}`;
    } else if (now >= start && now <= end) {
        const diff = end - now;
        const h = Math.floor(diff / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        const s = Math.floor((diff % (1000*60)) / 1000);
        display = `Event is live! Ends in: ${h}h ${m}m ${s}s\nEnd time: ${formatTimeInZone(end)}`;
    } else {
        display = "Event has ended!";
        clearInterval(timerInterval);
    }

    document.getElementById('countdown').innerText = display;
}, 1000);
</script>

</body>
</html>

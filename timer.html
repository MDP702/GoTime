<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: 
    linear-gradient(135deg, rgba(52,152,219,0.7), rgba(41,128,185,0.7)),
    url('YOUR_IMAGE.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  text-align: center;
  padding: 80px 20px;
}
#title {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 60px;
  text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
}
#countdown {
  font-size: 72px;
  margin-top: 30px;
  padding: 50px;
  background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(0,0,0,0.2));
  border-radius: 40px;
  display: inline-block;
  min-width: 500px;
  white-space: pre-line;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  text-align: center;
}
#countdown .status {
  font-size: 80px; /* extra big for Live/Ended */
  font-weight: 700;
  color: #ffeb3b;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}
#linkBox {
  margin-top: 40px;
}
input#timerLink {
  font-size: 28px;
  padding: 16px;
  width: 80%;
  border-radius: 12px;
  border: none;
  text-align: center;
}
button#copyBtn {
  font-size: 28px;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background-color: #f1c40f;
  color: #000;
  font-weight: bold;
  margin-left: 10px;
  cursor: pointer;
}
button#copyBtn:hover {
  background-color: #f4d03f;
}
</style>
</head>
<body>

<h1 id="title"></h1>
<p id="countdown"></p>

<div id="linkBox">
  <input type="text" id="timerLink" readonly>
  <button id="copyBtn" onclick="copyLink()">Copy Link</button>
</div>

<script>
function formatTimeInZone(date) {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return new Intl.DateTimeFormat([], {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
    }).format(date);
}

function copyLink() {
    const linkInput = document.getElementById("timerLink");
    linkInput.select();
    linkInput.setSelectionRange(0, 99999); 
    document.execCommand("copy");
    alert("Link copied to clipboard!");
}

const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "";
const startParam = params.get('start');
const endParam = params.get('end');

const currentURL = window.location.href;
document.getElementById('timerLink').value = currentURL;

if (!startParam || !endParam) {
    document.getElementById('countdown').innerHTML = "<span class='status'>Error: start or end time missing!</span>";
    document.getElementById('title').innerText = title;
} else {
    const start = new Date(startParam);
    const end = new Date(endParam);
    document.getElementById('title').innerText = title;

    const interval = setInterval(() => {
        const now = new Date();
        let line1 = "";
        let line2 = "";
        let line3 = "";
        let line4 = "";

        if (now < start) {
            const diff = start - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            line1 = "Starts in:";
            line2 = `${h}h ${m}m ${s}s`;
            line3 = "Start:";
            line4 = formatTimeInZone(start);
        } else if (now >= start && now <= end) {
            const diff = end - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            line1 = "<span class='status'>Live:</span>";
            line2 = `${h}h ${m}m ${s}s`;
            line3 = "End:";
            line4 = formatTimeInZone(end);
        } else {
            line1 = "<span class='status'>Event has ended!</span>";
            line2 = "";
            line3 = "";
            line4 = "";
            clearInterval(interval);
        }

        document.getElementById('countdown').innerHTML = `${line1}\n${line2}\n\n${line3}\n${line4}`;
    }, 1000);
}
</script>

</body>
</html>

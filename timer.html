<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4a90e2, #50c0e9);
  text-align: center;
  padding: 80px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1#title {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 50px;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}

#countdownCard {
  background: linear-gradient(145deg, #6FA8DC, #4A90E2);
  border-radius: 50px;
  min-width: 600px;
  max-width: 800px;
  padding: 60px 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.2);
}

#countdown .number {
  font-size: 72px; /* one line countdown */
  font-weight: 700;
  color: #fff;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  margin: 20px 0;
}

#countdown .eventTime {
  font-size: 48px; /* bigger than before */
  color: #fff;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
  margin: 15px 0;
  line-height: 1.4;
}

#linkBox {
  margin-top: 50px;
  background: linear-gradient(145deg, #6FA8DC, #4A90E2);
  padding: 40px;
  border-radius: 50px;
  max-width: 800px;
  min-width: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.2);
}

input#timerLink {
  font-size: 28px;
  padding: 16px;
  width: 95%;
  border-radius: 16px;
  border: none;
  text-align: center;
  background: rgba(255,255,255,0.2);
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  margin-bottom: 15px;
}

button#copyBtn {
  font-size: 28px;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #f1c40f, #f9e79f);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  width: 95%;
  box-shadow: 0 6px 20px rgba(241,196,15,0.4), inset 0 -2px 5px rgba(0,0,0,0.1);
  transition: 0.3s;
}

button#copyBtn:hover {
  background: linear-gradient(135deg, #f9e79f, #f1c40f);
  box-shadow: 0 10px 30px rgba(241,196,15,0.6), inset 0 -2px 5px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<h1 id="title"></h1>

<div id="countdownCard">
  <div id="countdown">Loading timer...</div>
</div>

<div id="linkBox">
  <input type="text" id="timerLink" readonly>
  <button id="copyBtn" onclick="copyLink()">Copy Link</button>
</div>

<script>
function formatTimeLines(date) {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const line1 = new Intl.DateTimeFormat([], { weekday:'long', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone: tz }).format(date);
    const line2 = new Intl.DateTimeFormat([], { day:'2-digit', month:'long', year:'numeric', timeZone: tz }).format(date);
    return [line1, line2];
}

function copyLink() {
    const linkInput = document.getElementById("timerLink");
    linkInput.select();
    linkInput.setSelectionRange(0, 99999); 
    document.execCommand("copy");
    alert("Link copied to clipboard!");
}

const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "";
const startParam = params.get('start');
const endParam = params.get('end');

document.getElementById('title').innerText = title;
document.getElementById('timerLink').value = window.location.href;

if (!startParam || !endParam) {
    document.getElementById('countdown').innerHTML = "Error: start or end time missing!";
} else {
    const start = new Date(startParam);
    const end = new Date(endParam);
    const countdownDiv = document.getElementById('countdown');

    const interval = setInterval(() => {
        const now = new Date();
        let line1="", line2="", line3="", line4="";

        const [startLine1, startLine2] = formatTimeLines(start);
        const [endLine1, endLine2] = formatTimeLines(end);

        if (now < start) {
            const diff = start - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            line1 = "START";
            line2 = `<span class='number'>${h}h ${m}m ${s}s</span>`;
            line3 = `<span class='eventTime'>${startLine1}</span>`;  // Weekday – Time
            line4 = `<span class='eventTime'>${startLine2}</span>`;  // Day Month Year
        } else if (now >= start && now <= end) {
            const diff = end - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            line1 = "LIVE";
            line2 = `<span class='number'>${h}h ${m}m ${s}s</span>`;
            line3 = `<span class='eventTime'>${endLine1}</span>`;
            line4 = `<span class='eventTime'>${endLine2}</span>`;
        } else {
            line1 = "ENDED";
            line2 = "";
            line3 = "";
            line4 = "";
            clearInterval(interval);
        }

        countdownDiv.innerHTML = `${line1}\n${line2}\n${line3}\n${line4}`;
    }, 1000);
}
</script>

</body>
</html>

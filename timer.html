<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #3FA9F5, #6EC1E4);
  color: #000;
  text-align: center;
  padding: 80px 20px;
}

#title {
  font-size: 80px;
  font-weight: 700;
  margin-bottom: 60px;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
}

#countdown {
  font-size: 72px;
  margin-top: 30px;
  padding: 50px;
  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  border-radius: 40px;
  display: inline-block;
  min-width: 500px;
  white-space: pre-line;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.2), -5px -5px 20px rgba(255,255,255,0.5);
  text-align: center;
}

#countdown .number {
  font-size: 90px;
  font-weight: 700;
  color: #000;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
  display: block;
  margin: 20px 0;
}

#countdown .eventTime {
  font-size: 50px;
  margin-top: 10px;
  display: block;
  line-height: 1.3;
}

#linkBox {
  margin-top: 40px;
  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  padding: 30px;
  border-radius: 30px;
  display: inline-block;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.2), -5px -5px 20px rgba(255,255,255,0.5);
}

input#timerLink {
  font-size: 28px;
  padding: 16px;
  width: 80%;
  border-radius: 16px;
  border: none;
  text-align: center;
  background: rgba(255,255,255,0.7);
  color: #000;
  box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
}

button#copyBtn {
  font-size: 28px;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background-color: #f1c40f;
  color: #000;
  font-weight: bold;
  margin-left: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button#copyBtn:hover {
  background-color: #f4d03f;
}
</style>
</head>
<body>

<h1 id="title"></h1>
<p id="countdown"></p>

<div id="linkBox">
  <input type="text" id="timerLink" readonly>
  <button id="copyBtn" onclick="copyLink()">Copy Link</button>
</div>

<script>
function formatTimeLines(date) {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;

    const optionsLine2 = { day: '2-digit', month: 'long', weekday:'long', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone: tz };
    const line2 = new Intl.DateTimeFormat([], optionsLine2).format(date);

    const optionsLine3 = { day: '2-digit', month: 'long', year:'numeric', timeZone: tz };
    const line3 = new Intl.DateTimeFormat([], optionsLine3).format(date);

    return [line2, line3];
}

function copyLink() {
    const linkInput = document.getElementById("timerLink");
    linkInput.select();
    linkInput.setSelectionRange(0, 99999); 
    document.execCommand("copy");
    alert("Link copied to clipboard!");
}

const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "";
const startParam = params.get('start');
const endParam = params.get('end');

const currentURL = window.location.href;
document.getElementById('timerLink').value = currentURL;

if (!startParam || !endParam) {
    document.getElementById('countdown').innerHTML = "<span class='status'>Error: start or end time missing!</span>";
    document.getElementById('title').innerText = title;
} else {
    const start = new Date(startParam);
    const end = new Date(endParam);
    document.getElementById('title').innerText = title;

    const interval = setInterval(() => {
        const now = new Date();
        let line1 = "", line2 = "", line3 = "", line4 = "";

        const [startLine2, startLine3] = formatTimeLines(start);
        const [endLine2, endLine3] = formatTimeLines(end);

        if (now < start) {
            const diff = start - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            line1 = "START";
            line2 = `<span class='number'>${h}h ${m}m ${s}s</span>`;
            line3 = `<span class='eventTime'>${startLine2}</span>`;
            line4 = `<span class='eventTime'>${startLine3}</span>`;
        } else if (now >= start && now <= end) {
            const diff = end - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);

            line1 = "LIVE";
            line2 = `<span class='number'>${h}h ${m}m ${s}s</span>`;
            line3 = `<span class='eventTime'>${endLine2}</span>`;
            line4 = `<span class='eventTime'>${endLine3}</span>`;
        } else {
            line1 = "ENDED";
            line2 = "";
            line3 = "";
            line4 = "";
            clearInterval(interval);
        }

        document.getElementById('countdown').innerHTML = `${line1}\n${line2}\n${line3}\n${line4}`;
    }, 1000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: 
    linear-gradient(135deg, rgba(52,152,219,0.7), rgba(41,128,185,0.7)),
    url('YOUR_IMAGE.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  text-align: center;
  padding: 80px 20px;
}
#title {
  font-size: 80px; /* very large title */
  font-weight: 700;
  margin-bottom: 60px;
  text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
}

/* Beautiful countdown box */
#countdown {
  font-size: 72px; /* huge countdown text */
  margin-top: 30px;
  padding: 50px;
  background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(0,0,0,0.2));
  border-radius: 40px;
  display: inline-block;
  min-width: 500px;
  white-space: pre-line;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<h1 id="title"></h1>
<p id="countdown"></p>

<script>
function formatTimeInZone(date) {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return new Intl.DateTimeFormat([], {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
    }).format(date);
}

const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "";
const startParam = params.get('start');
const endParam = params.get('end');

if (!startParam || !endParam) {
    document.getElementById('countdown').innerText = "Error: start or end time missing!";
    document.getElementById('title').innerText = title;
} else {
    const start = new Date(startParam);
    const end = new Date(endParam);
    document.getElementById('title').innerText = title;

    const interval = setInterval(() => {
        const now = new Date();
        let displayText = "";

        if (now < start) {
            const diff = start - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            displayText = `Event starts in: ${h}h ${m}m ${s}s\nStart: ${formatTimeInZone(start)}`;
        } else if (now >= start && now <= end) {
            const diff = end - now;
            const h = Math.floor(diff / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            displayText = `Event is live! Ends in: ${h}h ${m}m ${s}s\nEnd: ${formatTimeInZone(end)}`;
        } else {
            displayText = "Event has ended!";
            clearInterval(interval);
        }

        document.getElementById('countdown').innerText = displayText;
    }, 1000);
}
</script>

</body>
</html>

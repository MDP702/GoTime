<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Its Go Time</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2575fc, #6a11cb);
  color: #fff;
  text-align: center;
  padding: 60px 20px;
}
#title {
  font-size: 36px;
  font-weight: bold;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}
#countdown {
  font-size: 28px;
  margin-top: 30px;
  padding: 20px;
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  display: inline-block;
  min-width: 300px;
}
.upcoming { color: #ffce00; }
.live { color: #00ff6a; }
.ended { color: #ff3c3c; }
</style>
</head>
<body>

<h1 id="title"></h1>
<p id="countdown"></p>

<script>
function formatTimeInZone(date) {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return new Intl.DateTimeFormat([], {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
    }).format(date);
}

const params = new URLSearchParams(window.location.search);
const title = params.get('title') || "Its Go Time";
const start = new Date(params.get('start'));
const end = new Date(params.get('end'));

document.getElementById('title').innerText = title;

let timerInterval = setInterval(() => {
    const now = new Date();
    const countdownElem = document.getElementById('countdown');
    let displayText = "";

    if (now < start) {
        const diff = start - now;
        const h = Math.floor(diff / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        const s = Math.floor((diff % (1000*60)) / 1000);
        displayText = `Event starts in: ${h}h ${m}m ${s}s\nStart time: ${formatTimeInZone(start)}`;
        countdownElem.className = "upcoming";
    } else if (now >= start && now <= end) {
        const diff = end - now;
        const h = Math.floor(diff / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        const s = Math.floor((diff % (1000*60)) / 1000);
        displayText = `Event is live! Ends in: ${h}h ${m}m ${s}s\nEnd time: ${formatTimeInZone(end)}`;
        countdownElem.className = "live";
    } else {
        displayText = "Event has ended!";
        countdownElem.className = "ended";
        clearInterval(timerInterval);
    }

    countdownElem.innerText = displayText;
}, 1000);
</script>

</body>
</html>
